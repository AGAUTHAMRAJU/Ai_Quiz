{% extends "base.html" %}

{% load static %}

{% block title %}
Verify OTP
{% endblock %}

{% block extra_css %}

<link rel="stylesheet"
      href="{% static 'css/auth.css' %}">

{% endblock %}

{% block content %}

<section class="auth-section">

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-5 col-md-7">

<div class="auth-card text-center">

<div class="auth-icon mb-4">

<i class="bi bi-shield-lock-fill"></i>

</div>

<h2 class="fw-bold mb-3">

Verify Email

</h2>

<p class="text-muted mb-4">

We've sent a 6-digit OTP to your registered email address.

</p>

<form method="POST">

{% csrf_token %}

<div class="mb-4">

<label class="form-label">

Enter OTP

</label>

<input
type="text"
name="otp"
maxlength="6"
class="form-control text-center fs-3 fw-bold"
placeholder="------"
required>

</div>

<div class="d-grid mb-3">

<button
class="btn btn-primary btn-lg">

<i class="bi bi-check-circle-fill me-2"></i>

Verify OTP

</button>

</div>

</form>

<hr>

<p class="mb-2">

Didn't receive the OTP?

</p>

<a
href="{% url 'register' %}"
class="btn btn-outline-primary">

<i class="bi bi-arrow-repeat me-2"></i>

Register Again

</a>

</div>

</div>

</div>

</div>

</section>

{% endblock %}
