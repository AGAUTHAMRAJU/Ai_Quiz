{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-5">

<div class="card p-4">

<h3>Verify OTP</h3>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<form method="POST">

{% csrf_token %}

<input
type="text"
name="otp"
maxlength="6"
class="form-control mb-3"
placeholder="Enter OTP"
required>

<button class="btn btn-success w-100">

Verify OTP

</button>

</form>

</div>

</div>

</div>

{% endblock %}
