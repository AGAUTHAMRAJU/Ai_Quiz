{% extends "base.html" %}

{% load static %}

{% block title %}
Forgot Password
{% endblock %}

{% block extra_css %}

<link rel="stylesheet"
      href="{% static 'css/auth.css' %}">

{% endblock %}

{% block content %}

<section class="auth-section">

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-5 col-md-7">

<div class="auth-card">

<div class="text-center mb-4">

<div class="auth-icon">

<i class="bi bi-key-fill"></i>

</div>

<h2 class="fw-bold">

Forgot Password

</h2>

<p class="text-muted">

Enter your registered email address.

</p>

</div>

<form method="POST">

{% csrf_token %}

<div class="mb-4">

<label class="form-label">

Email Address

</label>

<div class="input-group">

<span class="input-group-text">

<i class="bi bi-envelope-fill"></i>

</span>

<input
type="email"
name="email"
class="form-control"
placeholder="Enter Email"
required>

</div>

</div>

<div class="d-grid">

<button
class="btn btn-primary btn-lg">

<i class="bi bi-send-fill me-2"></i>

Send OTP

</button>

</div>

</form>

<hr>

<div class="text-center">

<a
href="{% url 'login' %}">

Back to Login

</a>

</div>

</div>

</div>

</div>

</div>

</section>

{% endblock %}
