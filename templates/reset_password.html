{% extends "base.html" %}

{% load static %}

{% block title %}
Reset Password
{% endblock %}

{% block extra_css %}

<link rel="stylesheet"
      href="{% static 'css/auth.css' %}">

{% endblock %}

{% block content %}

<section class="auth-section">

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-5 col-md-7">

<div class="auth-card">

<div class="text-center mb-4">

<div class="auth-icon">

<i class="bi bi-shield-lock-fill"></i>

</div>

<h2 class="fw-bold">

Create New Password

</h2>

<p class="text-muted">

Your new password must be secure.

</p>

</div>

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label class="form-label">

New Password

</label>

<div class="input-group">

<span class="input-group-text">

<i class="bi bi-lock-fill"></i>

</span>

<input
type="password"
name="password1"
id="password1"
class="form-control"
placeholder="Enter New Password"
required>

<button
type="button"
class="btn btn-outline-secondary"
id="togglePassword1">

<i class="bi bi-eye-fill"></i>

</button>

</div>

</div>

<div class="mb-4">

<label class="form-label">

Confirm Password

</label>

<div class="input-group">

<span class="input-group-text">

<i class="bi bi-lock-fill"></i>

</span>

<input
type="password"
name="password2"
id="password2"
class="form-control"
placeholder="Confirm Password"
required>

<button
type="button"
class="btn btn-outline-secondary"
id="togglePassword2">

<i class="bi bi-eye-fill"></i>

</button>

</div>

</div>

<div class="d-grid">

<button
class="btn btn-primary btn-lg">

<i class="bi bi-check-circle-fill me-2"></i>

Reset Password

</button>

</div>

</form>

</div>

</div>

</div>

</div>

</section>

{% endblock %}

{% block extra_js %}

<script>

function toggle(id,btn){

const input=document.getElementById(id);

const button=document.getElementById(btn);

button.onclick=function(){

if(input.type==="password"){

input.type="text";

button.innerHTML='<i class="bi bi-eye-slash-fill"></i>';

}

else{

input.type="password";

button.innerHTML='<i class="bi bi-eye-fill"></i>';

}

};

}

toggle("password1","togglePassword1");

toggle("password2","togglePassword2");

</script>

{% endblock %}
