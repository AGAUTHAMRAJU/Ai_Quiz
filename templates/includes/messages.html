{% if messages %}

<div class="container mt-3">

    {% for message in messages %}

    <div class="alert auto-dismiss alert-{{ message.tags|default:'info' }} alert-dismissible fade show shadow-sm border-0">

        <div class="d-flex align-items-center">

            {% if message.tags == "success" %}

            <i class="bi bi-check-circle-fill fs-4 text-success me-3"></i>

            {% elif message.tags == "error" %}

            <i class="bi bi-x-circle-fill fs-4 text-danger me-3"></i>

            {% elif message.tags == "warning" %}

            <i class="bi bi-exclamation-triangle-fill fs-4 text-warning me-3"></i>

            {% elif message.tags == "info" %}

            <i class="bi bi-info-circle-fill fs-4 text-primary me-3"></i>

            {% else %}

            <i class="bi bi-bell-fill fs-4 text-primary me-3"></i>

            {% endif %}

            <div class="flex-grow-1">

                {{ message }}

            </div>

            <button
                type="button"
                class="btn-close"
                data-bs-dismiss="alert">
            </button>

        </div>

    </div>

    {% endfor %}

</div>

{% endif %}
